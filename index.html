<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vítkova kalkulačka</title>

    <style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;

    background: linear-gradient(
        135deg,
        #0f0f1a,
        #1e1e2f,
        #5b3fa3
    );

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

form {
    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(12px);

    padding: 35px;

    border-radius: 25px;

    box-shadow:
        0 0 25px rgba(0,0,0,0.4),
        0 0 60px rgba(107,76,165,0.3);

    width: 320px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;

    font-size: 32px;
}

input[type="text"],
input[type="number"] {

    width: 90%;

    padding: 12px;

    margin: 8px 0;

    border: none;
    border-radius: 12px;

    background: rgba(255,255,255,0.12);

    color: white;

    font-size: 16px;

    outline: none;

    transition: 0.2s;
}

input[type="text"]:focus,
input[type="number"]:focus {

    background: rgba(255,255,255,0.18);

    transform: scale(1.02);
}

input[type="button"] {

    padding: 12px 15px;

    margin: 5px;

    border: none;
    border-radius: 12px;

    background: linear-gradient(
        135deg,
        #7b5cff,
        #5b3fa3
    );

    color: white;

    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;

    box-shadow: 0 0 10px rgba(123,92,255,0.4);
}

input[type="button"]:hover {

    transform: translateY(-3px) scale(1.05);

    box-shadow:
        0 0 20px rgba(123,92,255,0.7);
}

#vysledek {

    margin-top: 20px;

    font-size: 24px;

    font-weight: bold;

    color: #cdb7ff;
}
        }

        body {
            margin: 0;
            font-family: Arial;

            background: linear-gradient(
                135deg,
                #0b0b10,
                #2b2b3a,
                #6b4ca5
            );

            background-size: cover;
            background-attachment: fixed;

            color: white;
            text-align: center;
        }

        form {
            margin-top: 50px;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }
    </style>

    <script>
        function Mocnina() {
            var x = Number(document.F1.X.value);
            var y = Number(document.F1.Y.value);
            var z = document.F1.Z.value;

            if (z == "") {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x ** y);
            } else {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + ((x ** y) ** Number(z));
            }
        }

        function Krat() {
            var x = Number(document.F1.X.value);
            var y = Number(document.F1.Y.value);
            var z = document.F1.Z.value;

            if (z == "") {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x * y);
            } else {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x * y * Number(z));
            }
        }

        function Deleno() {
            var x = Number(document.F1.X.value);
            var y = Number(document.F1.Y.value);
            var z = document.F1.Z.value;

            if (z == "") {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x / y);
            } else {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x / y / Number(z));
            }
        }

        function Minus() {
            var x = Number(document.F1.X.value);
            var y = Number(document.F1.Y.value);
            var z = document.F1.Z.value;

            if (z == "") {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x - y);
            } else {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x - y - Number(z));
            }
        }

        function Plus() {
            var x = Number(document.F1.X.value);
            var y = Number(document.F1.Y.value);
            var z = document.F1.Z.value;

            if (z == "") {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x + y);
            } else {
                document.getElementById("vysledek").innerHTML =
                    "Výsledek: " + (x + y + Number(z));
            }
        }
        function Procenta() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);

    var vysledek = x * (y / 100);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + vysledek;
}
        function Odmocnina() {
    var x = Number(document.F1.X.value);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + Math.sqrt(x);
}
        function Odmocnina2() {
    var y = Number(document.F1.Y.value);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + Math.sqrt(y);
}
        function Odmocnina3() {
    var z = Number(document.F1.Z.value);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + Math.sqrt(z);
}

    </script>
</head>

<body>

<h1>Vítkova kalkulačka 🐶</h1>

<form name="F1">
    x:
    <input type="text" name="X">
<br>
    y:
    <input type="text" name="Y">
<br>
    z:
    <input type="text" name="Z">

    <br><br>

    <input type="button" value="Krát" onclick="Krat()">
    <input type="button" value="Děleno" onclick="Deleno()">
    <input type="button" value="Mínus" onclick="Minus()">
    <input type="button" value="Plus" onclick="Plus()">
    <br>
    <input type="button" value="Mocnina x" onclick="Mocnina()">
    <input type="button" value="procenta x" onclick="Procenta()">
    <br>
        <input type="button" value="Odmocnina x" onclick="Odmocnina()">
        <input type="button" value="Odmocnina y" onclick="Odmocnina2()">
        <input type="button" value="Odmocnina z" onclick="Odmocnina3()">
  
    <p id="vysledek">Výsledek:</p>

    <div style="margin-top: 100px;"></div>

    <h3>Feedback</h3>
    <input type="text" name="hodnoceni" placeholder="1–10">
    <input type="button" value="Odeslat feedback" onclick="Feedback()">
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",
    authDomain: "kalkulacka-github.firebaseapp.com",
    projectId: "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.Feedback = async function () {
    let hodnoceni = document.F1.hodnoceni.value;

    if (!hodnoceni) {
        alert("Zadej hodnocení!");
        return;
    }

    await addDoc(collection(db, "feedbacks"), {
        text: hodnoceni,
        time: new Date()
    });

    alert("Díky za feedback!");
};
</script>

</body>
</html>
