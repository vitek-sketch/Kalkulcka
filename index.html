<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vítkova Kalkulačka</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f1a,#1e1e2f,#5b3fa3);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

form {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    width: 520px;
    max-width: 92vw;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
}

#display {
    width: 90%;
    padding: 18px;
    margin-bottom: 20px;
    border: none;
    border-radius: 15px;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 28px;
    text-align: right;
}

.kalk-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

input[type="button"] {
    padding: 18px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(135deg,#7b5cff,#5b3fa3);
    color: white;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

input[type="button"]:hover {
    transform: scale(1.05);
}

#vysledek {
    margin-top: 20px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    font-size: 28px;
}

.basic, .science {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

</style>
</head>

<body>

<form>

<h1>🐶 Vítkova Kalkulačka 🧮</h1>

<input id="display" type="text">

<div class="kalk-grid">

<!-- BASIC -->
<div id="basic">

<div class="basic">

    <input type="button" value="7" onclick="add('7')">
    <input type="button" value="8" onclick="add('8')">
    <input type="button" value="9" onclick="add('9')">
    <input type="button" value="/" onclick="add('/')">

    <input type="button" value="4" onclick="add('4')">
    <input type="button" value="5" onclick="add('5')">
    <input type="button" value="6" onclick="add('6')">
    <input type="button" value="*" onclick="add('*')">

    <input type="button" value="1" onclick="add('1')">
    <input type="button" value="2" onclick="add('2')">
    <input type="button" value="3" onclick="add('3')">
    <input type="button" value="-" onclick="add('-')">

    <input type="button" value="0" onclick="add('0')">
    <input type="button" value="." onclick="add('.')">

    <input type="button" value="=" onclick="calc()">
    <input type="button" value="+" onclick="add('+')">

    <!-- NOVÉ BASIC FUNKCE -->
    <input type="button" value="√" onclick="add('Math.sqrt(')">
    <input type="button" value="xʸ" onclick="add('**')">
    <input type="button" value="AVG" onclick="avg()">
    <input type="button" value="C" onclick="clearAll()">

    <input type="button" value="(" onclick="add('(')">
    <input type="button" value=")" onclick="add(')')">

</div>

</div>

<!-- SCIENCE -->
<div id="science" style="display:none;">

<div class="science">

    <input type="button" value="sin" onclick="add('Math.sin(')">
    <input type="button" value="cos" onclick="add('Math.cos(')">
    <input type="button" value="tan" onclick="add('Math.tan(')">
    <input type="button" value="π" onclick="add('3.141592')">

    <input type="button" value="7" onclick="add('7')">
    <input type="button" value="8" onclick="add('8')">
    <input type="button" value="9" onclick="add('9')">
    <input type="button" value="/" onclick="add('/')">

    <input type="button" value="4" onclick="add('4')">
    <input type="button" value="5" onclick="add('5')">
    <input type="button" value="6" onclick="add('6')">
    <input type="button" value="*" onclick="add('*')">

    <input type="button" value="1" onclick="add('1')">
    <input type="button" value="2" onclick="add('2')">
    <input type="button" value="3" onclick="add('3')">
    <input type="button" value="-" onclick="add('-')">

    <input type="button" value="0" onclick="add('0')">
    <input type="button" value="." onclick="add('.')">
    <input type="button" value="%" onclick="add('/100')">
    <input type="button" value="+" onclick="add('+')">

</div>

</div>

<input type="button" value="SCI" onclick="toggle()">

</div>

<div id="vysledek">Výsledek:</div>

</form>

<script>

let science = false;

function add(v){
    document.getElementById("display").value += v;
}

function calc(){
    try {
        let r = eval(document.getElementById("display").value);
        document.getElementById("vysledek").innerText = "Výsledek: " + r;
    } catch {
        document.getElementById("vysledek").innerText = "Chyba";
    }
}

function clearAll(){
    document.getElementById("display").value = "";
    document.getElementById("vysledek").innerText = "Výsledek:";
}

// AVG (průměr z +)
function avg(){
    let t = document.getElementById("display").value;
    let nums = t.split("+").map(Number);
    let s = nums.reduce((a,b)=>a+b,0);
    document.getElementById("vysledek").innerText =
        "Výsledek: " + (s/nums.length);
}

function toggle(){
    science = !science;

    document.getElementById("basic").style.display =
        science ? "none" : "block";

    document.getElementById("science").style.display =
        science ? "block" : "none";
}

</script>

</body>
</html>
