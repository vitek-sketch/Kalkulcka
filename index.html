        <!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vítkova kalkulačka</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;

    background: linear-gradient(
        135deg,
        #0f0f1a,
        #1e1e2f,
        #5b3fa3
    );

    background-size: 400% 400%;
    animation: gradient 10s ease infinite;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

form {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 25px;
    width: 340px;
    text-align: center;
}

input[type="number"],
input[type="text"] {
    width: 90%;
    padding: 12px;
    margin-bottom: 10px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.12);
    color: white;
}

input[type="button"] {
    padding: 10px;
    margin: 4px;
    border-radius: 10px;
    border: none;
    background: #7b5cff;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

input[type="button"]:hover {
    transform: scale(1.05);
}

#vysledek {
    margin-top: 20px;
    font-size: 26px;
    font-weight: bold;
}

#historie {
    margin-top: 10px;
    font-size: 13px;
    opacity: 0.9;
}

#historie div {
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 3px;
}

</style>

<script>

function pridejDoHistorie(text) {
    var div = document.getElementById("historie");
    div.innerHTML = "<div>" + text + "</div>" + div.innerHTML;
}

function Plus() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    var vysledek;

    if (z == "") {
        vysledek = x + y;
        pridejDoHistorie(x + " + " + y + " = " + vysledek);
    } else {
        vysledek = x + y + Number(z);
        pridejDoHistorie(x + " + " + y + " + " + z + " = " + vysledek);
    }

    document.getElementById("vysledek").innerHTML = "Výsledek: " + vysledek;
}

function Minus() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    var vysledek;

    if (z == "") {
        vysledek = x - y;
        pridejDoHistorie(x + " - " + y + " = " + vysledek);
    } else {
        vysledek = x - y - Number(z);
        pridejDoHistorie(x + " - " + y + " - " + z + " = " + vysledek);
    }

    document.getElementById("vysledek").innerHTML = "Výsledek: " + vysledek;
}

function Krat() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    var vysledek;

    if (z == "") {
        vysledek = x * y;
        pridejDoHistorie(x + " × " + y + " = " + vysledek);
    } else {
        vysledek = x * y * Number(z);
        pridejDoHistorie(x + " × " + y + " × " + z + " = " + vysledek);
    }

    document.getElementById("vysledek").innerHTML = "Výsledek: " + vysledek;
}

function Deleno() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    var vysledek;

    if (z == "") {
        vysledek = x / y;
        pridejDoHistorie(x + " ÷ " + y + " = " + vysledek);
    } else {
        vysledek = x / y / Number(z);
        pridejDoHistorie(x + " ÷ " + y + " ÷ " + z + " = " + vysledek);
    }

    document.getElementById("vysledek").innerHTML = "Výsledek: " + vysledek;
}

function Mocnina() {
    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);

    var vysledek = x ** y;

    pridejDoHistorie(x + " ^ " + y + " = " + vysledek);

    document.getElementById("vysledek").innerHTML = "Výsledek: " + vysledek;
}

</script>

</head>

<body>

<form name="F1">

<h1>Vítkova kalkulačka 🐶</h1>

<input type="number" name="X" placeholder="X">
<input type="number" name="Y" placeholder="Y">
<input type="number" name="Z" placeholder="Z">

<br>

<input type="button" value="Plus" onclick="Plus()">
<input type="button" value="Minus" onclick="Minus()">
<input type="button" value="Krat" onclick="Krat()">
<input type="button" value="Deleno" onclick="Deleno()">
<input type="button" value="Mocnina" onclick="Mocnina()">

<p id="vysledek">Výsledek:</p>

<h3>Historie</h3>
<div id="historie"></div>

<h3>Feedback</h3>

<input type="text" name="hodnoceni" placeholder="1–10">
<input type="button" value="Odeslat feedback" onclick="Feedback()">

</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",
    authDomain: "kalkulacka-github.firebaseapp.com",
    projectId: "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.Feedback = async function () {
    let hodnoceni = document.F1.hodnoceni.value;

    await addDoc(collection(db, "feedbacks"), {
        text: hodnoceni,
        time: new Date()
    });

    alert("Díky za feedback!");
};
</script>

</body>
</html>
