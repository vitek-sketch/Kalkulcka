<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Vítkova Kalkulačka</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f1a,#1e1e2f,#5b3fa3);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

form {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    width: 520px;
    max-width: 92vw;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

/* GRID */
.kalk-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    margin-top: 10px;
}

.sloupec {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* INPUT */
input[type="number"] {
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 22px;
    text-align: center;
}

/* BUTTONS */
input[type="button"] {
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,#7b5cff,#5b3fa3);
    color: white;
    cursor: pointer;
}

/* RESULT */
#vysledek {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    font-size: 28px;
}

#operace {
    margin-bottom: 10px;
    opacity: 0.8;
}
</style>

<script>
function getX(){ return Number(document.F1.X.value); }
function getY(){ return Number(document.F1.Y.value); }
function getZ(){ return document.F1.Z.value === "" ? null : Number(document.F1.Z.value); }

function setResult(v){
    document.getElementById("vysledek").innerHTML = "Výsledek: " + v;
}

function updateOperation(op){

    let x = document.F1.X.value;
    let y = document.F1.Y.value;
    let z = document.F1.Z.value;

    let text = x + " " + op + " " + y;

    if(z !== ""){
        text += " " + op + " " + z;
    }

    document.getElementById("operace").innerHTML =
        "Operace: " + text;
}

/* OPERACE */
function Plus(){
    let z = getZ();
    setResult(z===null ? getX()+getY() : getX()+getY()+z);
}

function Minus(){
    let z = getZ();
    setResult(z===null ? getX()-getY() : getX()-getY()-z);
}

function Krat(){
    let z = getZ();
    setResult(z===null ? getX()*getY() : getX()*getY()*z);
}

function Deleno(){
    let z = getZ();
    setResult(z===null ? getX()/getY() : getX()/getY()/z);
}

function Mocnina(){
    let z = getZ();
    setResult(z===null ? Math.pow(getX(),getY()) : Math.pow(Math.pow(getX(),getY()),z));
}

function Odmocnina(p){
    setResult(Math.sqrt(Number(document.F1[p].value)));
}

function Procenta(){
    setResult(getX() * (getY()/100));
}

/* BONUS */
function Pi(){
    document.F1.X.value = Math.PI.toFixed(5);
}

function ClearPole(){
    document.F1.X.value="";
    document.F1.Y.value="";
    document.F1.Z.value="";
    setResult("Výsledek:");
    document.getElementById("operace").innerHTML="Operace:";
}

function Prumer(){
    let nums=[];
    if(document.F1.X.value!=="") nums.push(getX());
    if(document.F1.Y.value!=="") nums.push(getY());
    if(document.F1.Z.value!=="") nums.push(getZ());

    if(nums.length===0){
        setResult("Zadej čísla");
        return;
    }

    setResult(nums.reduce((a,b)=>a+b,0)/nums.length);
}
</script>

</head>

<body>

<form name="F1">

<h1>🐶 Vítkova Kalkulačka 🧮</h1>

<div id="operace">Operace:</div>

<div class="kalk-grid">

    <!-- LEVÁ -->
    <div class="sloupec">
        <input type="button" value="+" onclick="updateOperation('+'); Plus()">
        <input type="button" value="-" onclick="updateOperation('-'); Minus()">
        <input type="button" value="×" onclick="updateOperation('×'); Krat()">
        <input type="button" value="÷" onclick="updateOperation('÷'); Deleno()">
                       <div style="margin-top:20px"></div>
        <input type="button" value="%" onclick="updateOperation('%'); Procenta()">
        <input type="button" value="AVG" onclick="Prumer()">
    </div>

    <!-- STŘED -->
    <div class="sloupec">
        <input type="number" name="X" placeholder="X">
        <input type="number" name="Y" placeholder="Y">
        <input type="number" name="Z" placeholder="Z">
    </div>

    <!-- PRAVÁ -->
    <div class="sloupec">
        <input type="button" value="xʸ" onclick="Mocnina()">
        <input type="button" value="√x" onclick="Odmocnina('X')">
        <input type="button" value="√y" onclick="Odmocnina('Y')">
        <input type="button" value="√z" onclick="Odmocnina('Z')">
                       <div style="margin-top:20px"></div>
        <input type="button" value="π" onclick="Pi()">
        <input type="button" value="C" onclick="ClearPole()">
    </div>

</div>

<div id="vysledek">Výsledek:</div>

<h3>Feedback</h3>

<input type="text" name="hodnoceni" placeholder="1–10">
<br><br>
<input type="button" value="Odeslat feedback" onclick="Feedback()">

</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",
    authDomain: "kalkulacka-github.firebaseapp.com",
    projectId: "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.Feedback = async function(){
    let h=document.F1.hodnoceni.value;

    if(!h){
        alert("Zadej hodnocení!");
        return;
    }

    await addDoc(collection(db,"feedbacks"),{
        text:h,
        time:new Date()
    });

    alert("Děkuji!");
};
</script>

</body>
</html>
