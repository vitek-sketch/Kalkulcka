<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vítkova Kalkulačka</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;

    background: linear-gradient(
        135deg,
        #0f0f1a,
        #1e1e2f,
        #5b3fa3
    );

    background-size: 400% 400%;
    animation: gradient 10s ease infinite;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

@keyframes gradient {

    0% { background-position: 0% 50%; }

    50% { background-position: 100% 50%; }

    100% { background-position: 0% 50%; }
}

form {

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(12px);

    width: 520px;

    max-width: 92vw;

    padding: 30px;

    border-radius: 25px;

    box-shadow:
        0 0 25px rgba(0,0,0,0.4),
        0 0 60px rgba(107,76,165,0.3);

    text-align: center;
}

h1 {

    margin-bottom: 20px;

    text-shadow: 0 0 10px #b388ff;
}

#display {

    width: 90%;

    padding: 18px;

    margin-bottom: 20px;

    border: none;

    border-radius: 15px;

    background: rgba(255,255,255,0.12);

    color: white;

    font-size: 28px;

    text-align: right;

    outline: none;
}

.kalk-grid {

    display: grid;

    grid-template-columns: repeat(4, 1fr);

    gap: 12px;
}

input[type="button"] {

    padding: 18px;

    border: none;

    border-radius: 15px;

    background: linear-gradient(
        135deg,
        #7b5cff,
        #5b3fa3
    );

    color: white;

    font-size: 20px;

    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;
}

input[type="button"]:hover {

    transform: translateY(-3px) scale(1.05);

    box-shadow:
        0 0 20px rgba(123,92,255,0.7);
}

#vysledek {

    margin-top: 20px;

    padding: 15px;

    border-radius: 15px;

    background: rgba(255,255,255,0.1);

    font-size: 28px;

    font-weight: bold;

    text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

#Pythagor {

    margin-top: 25px;

    padding: 20px;

    border-radius: 20px;

    background: rgba(255,255,255,0.08);
}

.py-grid {

    display: flex;

    justify-content: center;

    gap: 10px;

    margin-top: 15px;
}

.py-grid input {

    width: 90px;

    padding: 12px;

    border: none;

    border-radius: 12px;

    background: rgba(255,255,255,0.12);

    color: white;

    text-align: center;

    font-size: 20px;

    outline: none;
}

.feedback {

    margin-top: 30px;
}

.feedback input[type="text"] {

    width: 90%;

    padding: 10px;

    border-radius: 10px;

    border: none;

    background: rgba(255,255,255,0.12);

    color: white;
}

</style>

<script>

function pridej(hodnota){

    document.getElementById("display").value += hodnota;
}

function Vypocet(){

    try {

        let priklad =
            document.getElementById("display").value;

        let vysledek = eval(priklad);

        setResult(vysledek);

    } catch {

        setResult("Chyba");
    }
}

function setResult(v){

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + v;
}

function ClearPole(){

    document.getElementById("display").value = "";

    setResult("");
}

function Pi(){

    pridej("3.141592");
}

function Odmocnina(){

    pridej("Math.sqrt(");
}

function Mocnina(){

    pridej("**");
}

function Prumer(){

    let text =
        document.getElementById("display").value;

    let nums =
        text.split("+").map(Number);

    let sum =
        nums.reduce((a,b)=>a+b,0);

    setResult((sum / nums.length).toFixed(3));
}

function OtevriPythagora(){

    let div =
        document.getElementById("Pythagor");

    if(div.style.display == "none"){

        div.style.display = "block";

    } else {

        div.style.display = "none";
    }
}

function Pythagor(){

    let a =
        parseFloat(document.getElementById("A").value);

    let b =
        parseFloat(document.getElementById("B").value);

    let c =
        parseFloat(document.getElementById("C").value);

    if(isNaN(c)){

        c = Math.sqrt(a*a + b*b);

        setResult("C = " + c.toFixed(3));
    }

    else if(isNaN(a)){

        a = Math.sqrt(c*c - b*b);

        setResult("A = " + a.toFixed(3));
    }

    else if(isNaN(b)){

        b = Math.sqrt(c*c - a*a);

        setResult("B = " + b.toFixed(3));
    }

    else {

        setResult("Nech jedno pole prázdné");
    }
}

</script>

</head>

<body>

<form name="F1">

<h1>🐶 Vítkova Kalkulačka 🧮</h1>

<input
    type="text"
    id="display"
    placeholder="0"
>

<div class="kalk-grid">

    <input type="button" value="7" onclick="pridej('7')">
    <input type="button" value="8" onclick="pridej('8')">
    <input type="button" value="9" onclick="pridej('9')">
    <input type="button" value="÷" onclick="pridej('/')">

    <input type="button" value="4" onclick="pridej('4')">
    <input type="button" value="5" onclick="pridej('5')">
    <input type="button" value="6" onclick="pridej('6')">
    <input type="button" value="×" onclick="pridej('*')">

    <input type="button" value="1" onclick="pridej('1')">
    <input type="button" value="2" onclick="pridej('2')">
    <input type="button" value="3" onclick="pridej('3')">
    <input type="button" value="-" onclick="pridej('-')">

    <input type="button" value="0" onclick="pridej('0')">
    <input type="button" value="." onclick="pridej('.')">
    <input type="button" value="=" onclick="Vypocet()">
    <input type="button" value="+" onclick="pridej('+')">

    <input type="button" value="π" onclick="Pi()">
    <input type="button" value="√" onclick="Odmocnina()">
    <input type="button" value="xʸ" onclick="Mocnina()">
    <input type="button" value="%" onclick="pridej('/100')">

    <input type="button" value="AVG" onclick="Prumer()">
    <input type="button" value="C" onclick="ClearPole()">
    <input type="button" value="P" onclick="OtevriPythagora()">
    <input type="button" value="(" onclick="pridej('(')">

    <input type="button" value=")" onclick="pridej(')')">

</div>

<div id="vysledek">
Výsledek:
</div>

<div id="Pythagor" style="display:none;">

    <h2>Pythagorova věta 📐</h2>

    <div class="py-grid">

        <input
            type="number"
            id="A"
            placeholder="A"
        >

        <input
            type="number"
            id="B"
            placeholder="B"
        >

        <input
            type="number"
            id="C"
            placeholder="C"
        >

    </div>

    <br>

    <input
        type="button"
        value="Spočítat"
        onclick="Pythagor()"
    >

</div>

<div class="feedback">

<h3>Feedback</h3>

<input
    type="text"
    name="hodnoceni"
    placeholder="1–10"
>

<br><br>

<input
    type="button"
    value="Odeslat feedback"
    onclick="Feedback()"
>

</div>

</form>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "TVŮJ_API_KEY",

    authDomain:
    "kalkulacka-github.firebaseapp.com",

    projectId:
    "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.Feedback = async function () {

    let hodnoceni =
        parseInt(document.F1.hodnoceni.value);

    if (isNaN(hodnoceni)) {

        alert("Zadej číslo!");
        return;
    }

    await addDoc(
        collection(db, "feedbacks"),
        {
            text: hodnoceni,
            time: new Date()
        }
    );

    document.F1.hodnoceni.value = "";

    if (hodnoceni > 3) {

        window.location.replace(
            "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
        );

    } else {

        alert("Děkuji za feedback!");
    }
};

</script>

</body>
</html>
