<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title><h1>🐶 Vítkova Kalkulačka 🧮</h1></title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;

    background: linear-gradient(
        135deg,
        #0f0f1a,
        #1e1e2f,
        #5b3fa3
    );

    background-size: 400% 400%;
    animation: gradient 10s ease infinite;

    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: white;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

form {
    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(12px);

    width: 500px;
    max-width: 90vw;

    padding: 30px;

    border-radius: 25px;

    box-shadow:
        0 0 25px rgba(0,0,0,0.4),
        0 0 60px rgba(107,76,165,0.3);

    text-align: center;
}

h1 {
    font-size: 34px;

    margin-bottom: 25px;

    text-shadow: 0 0 10px #b388ff;
}

label {
    display: block;

    margin-top: 12px;
    margin-bottom: 5px;
}

input[type="number"],
input[type="text"] {
    width: 80%;

    padding: 12px;

    border: none;
    border-radius: 12px;

    background: rgba(255,255,255,0.12);

    color: white;

    font-size: 16px;

    outline: none;

    transition: 0.2s;
}

input[type="number"]:focus,
input[type="text"]:focus {
    background: rgba(255,255,255,0.18);

    transform: scale(1.02);
}

input[type="button"] {
    padding: 12px 15px;

    margin: 5px;

    border: none;
    border-radius: 12px;

    background: linear-gradient(
        135deg,
        #7b5cff,
        #5b3fa3
    );

    color: white;

    font-weight: bold;

    cursor: pointer;

    transition: 0.2s;

    box-shadow: 0 0 10px rgba(123,92,255,0.4);
}

/* HOVER EFEKT */
input[type="button"]:hover {
    transform: translateY(-3px) scale(1.05);

    box-shadow:
        0 0 20px rgba(123,92,255,0.7);
}

#vysledek {
    margin-top: 25px;

    padding: 15px;

    border-radius: 15px;

    background: rgba(255,255,255,0.1);

    font-size: 28px;

    font-weight: bold;

    color: white;

    text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

h3 {
    margin-top: 35px;
}

#historie {
    margin-top: 10px;
    font-size: 14px;
}

#historie div {
    padding: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.feedback-box {
    margin-top: 40px;
}

.feedback-box input[type="text"] {
    width: 90%;
}
</style>

<script>
function pridejDoHistorie(text) {
    var div = document.getElementById("historie");
    div.innerHTML = "<div>" + text + "</div>" + div.innerHTML;
}
function Mocnina() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    if (z == "") {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x ** y);

    } else {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + ((x ** y) ** Number(z));
    }
}

function Krat() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    if (z == "") {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x * y);

    } else {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x * y * Number(z));
    }
}

function Deleno() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    if (z == "") {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x / y);

    } else {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x / y / Number(z));
    }
}

function Minus() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    if (z == "") {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x - y);

    } else {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x - y - Number(z));
    }
}

function Plus() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);
    var z = document.F1.Z.value;

    if (z == "") {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x + y);

    } else {

        document.getElementById("vysledek").innerHTML =
            "Výsledek: " + (x + y + Number(z));
    }
}

function Procenta() {

    var x = Number(document.F1.X.value);
    var y = Number(document.F1.Y.value);

    var vysledek = x * (y / 100);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + vysledek;
}

function Odmocnina(promenna) {

    var cislo = Number(document.F1[promenna].value);

    document.getElementById("vysledek").innerHTML =
        "Výsledek: " + Math.sqrt(cislo);
}

</script>

</head>

<body>

<form name="F1">

<h1>Vítkova kalkulačka 🐶</h1>

<label>X:</label>
<input type="number" name="X">

<label>Y:</label>
<input type="number" name="Y">

<label>Z:</label>
<input type="number" name="Z">

<br>

<input type="button" value="Krát" onclick="Krat()">
<input type="button" value="Děleno" onclick="Deleno()">
<input type="button" value="Mínus" onclick="Minus()">
<input type="button" value="Plus" onclick="Plus()">

<br>

<input type="button" value="Mocnina" onclick="Mocnina()">
<input type="button" value="Procenta" onclick="Procenta()">

<br>

<input type="button" value="√x" onclick="Odmocnina('X')">
<input type="button" value="√y" onclick="Odmocnina('Y')">
<input type="button" value="√z" onclick="Odmocnina('Z')">

<p id="vysledek">Výsledek:</p>

<h3>Feedback</h3>

<input
    type="text"
    name="hodnoceni"
    placeholder="1–10"
>

<br>

<input
    type="button"
    value="Odeslat feedback"
    onclick="Feedback()"
>

</form>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",

    authDomain:
    "kalkulacka-github.firebaseapp.com",

    projectId:
    "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.Feedback = async function () {

    let hodnoceni =
        document.F1.hodnoceni.value;

    if (!hodnoceni) {

        alert("Zadej hodnocení!");
        return;
    }

    await addDoc(
        collection(db, "feedbacks"),
        {
            text: hodnoceni,
            time: new Date()
        }
    );

    alert("Děkuji za feedback!");
};

</script>

</body>
  </html>
