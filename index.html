<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Vítkova Kalkulačka</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f1a,#1e1e2f,#5b3fa3);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

form {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    width: 520px;
    max-width: 92vw;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
}

.kalk-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    margin-top: 10px;
}

.sloupec {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

input[type="number"],
input[type="text"] {
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.12);
    color: white;
    font-size: 20px;
    text-align: center;
}

input[type="button"] {
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg,#7b5cff,#5b3fa3);
    color: white;
    cursor: pointer;
}

#vysledek {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    font-size: 28px;
}

#operace {
    margin-bottom: 10px;
    opacity: 0.8;
}
</style>

<script>

/* ===== INPUT HELPERS ===== */
function getX(){ return Number(document.F1.X.value); }
function getY(){ return Number(document.F1.Y.value); }
function getZ(){ return document.F1.Z.value === "" ? null : Number(document.F1.Z.value); }

function setResult(v){
    document.getElementById("vysledek").innerHTML = "Výsledek: " + v;
}

/* ===== OPERACE ===== */
function Plus(){
    let z=getZ();
    setResult(z===null ? getX()+getY() : getX()+getY()+z);
}

function Minus(){
    let z=getZ();
    setResult(z===null ? getX()-getY() : getX()-getY()-z);
}

function Krat(){
    let z=getZ();
    setResult(z===null ? getX()*getY() : getX()*getY()*z);
}

function Deleno(){
    let z=getZ();
    setResult(z===null ? getX()/getY() : getX()/getY()/z);
}

function Mocnina(){
    let z=getZ();
    setResult(z===null ? Math.pow(getX(),getY()) : Math.pow(Math.pow(getX(),getY()),z));
}

function Odmocnina(p){
    setResult(Math.sqrt(Number(document.F1[p].value)));
}

function Procenta(){
    setResult(getX() * (getY()/100));
}

/* ===== BONUS ===== */
function Pi(){
    document.F1.X.value = Math.PI.toFixed(5);
}

function ClearPole(){
    document.F1.X.value="";
    document.F1.Y.value="";
    document.F1.Z.value="";
    setResult("Výsledek:");
}

/* ===== EXPRESSIONS ENGINE ===== */
function calculateExpression(){

    let input = document.getElementById("expr").value;

    if(!input){
        setResult("Zadej výraz");
        return;
    }

    let tokens = input
        .replace(/×/g,"*")
        .replace(/÷/g,"/")
        .split(" ")
        .filter(t=>t!=="");

    // × ÷
    for(let i=0;i<tokens.length;i++){
        if(tokens[i]=="*"||tokens[i]=="/"){
            let a=Number(tokens[i-1]);
            let b=Number(tokens[i+1]);
            let r = tokens[i]=="*" ? a*b : a/b;
            tokens.splice(i-1,3,r.toString());
            i=0;
        }
    }

    // + -
    let result=Number(tokens[0]);

    for(let i=1;i<tokens.length;i+=2){
        let op=tokens[i];
        let num=Number(tokens[i+1]);

        if(op=="+") result+=num;
        if(op=="-") result-=num;
    }

    setResult(result);
}

</script>

</head>

<body>

<form name="F1">

<h1>🐶 Vítkova Kalkulačka 🧮</h1>

<div id="operace">Operace:</div>

<!-- EXPRESSION INPUT -->
<input type="text" id="expr" placeholder="např. 3 + 4 * 5 - 2">

<div class="kalk-grid">

    <div class="sloupec">
        <input type="button" value="=" onclick="calculateExpression()">
        <input type="button" value="+" onclick="Plus()">
        <input type="button" value="-" onclick="Minus()">
        <input type="button" value="×" onclick="Krat()">
        <input type="button" value="÷" onclick="Deleno()">
        <input type="button" value="%" onclick="Procenta()">
    </div>

    <div class="sloupec">
        <input type="number" name="X">
        <input type="number" name="Y">
        <input type="number" name="Z">
    </div>

    <div class="sloupec">
        <input type="button" value="xʸ" onclick="Mocnina()">
        <input type="button" value="√x" onclick="Odmocnina('X')">
        <input type="button" value="√y" onclick="Odmocnina('Y')">
        <input type="button" value="√z" onclick="Odmocnina('Z')">
        <input type="button" value="π" onclick="Pi()">
        <input type="button" value="C" onclick="ClearPole()">
    </div>

</div>

<div id="vysledek">Výsledek:</div>

<h3>Feedback</h3>

<input type="text" name="hodnoceni" placeholder="1–10">
<br><br>
<input type="button" value="Odeslat feedback" onclick="Feedback()">

</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",
    authDomain: "kalkulacka-github.firebaseapp.com",
    projectId: "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.Feedback = async function(){
    let h=document.F1.hodnoceni.value;

    if(!h){
        alert("Zadej hodnocení!");
        return;
    }

    await addDoc(collection(db,"feedbacks"),{
        text:h,
        time:new Date()
    });

    alert("Děkuji!");
};
</script>

</body>
</html>
