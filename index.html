<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vítkova kalkulačka</title>

    <style>
        body {
    margin: 0;
    font-family: Arial;

    background: linear-gradient(
        135deg,
        #0b0b10,
        #2b2b3a,
        #6b4ca5
    );

    background-size: cover;
    background-attachment: fixed;

    color: white;
    text-align: center;
}
        }

        form {
            margin-top: 50px;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }
    </style>

    <script>
        function Krat() {
            var x = document.F1.X.value;
            var y = document.F1.Y.value;
            document.getElementById("vysledek").innerHTML = "Výsledek: " + (x * y);
        }

        function Deleno() {
            var x = document.F1.X.value;
            var y = document.F1.Y.value;
            document.getElementById("vysledek").innerHTML = "Výsledek: " + (x / y);
        }

        function Minus() {
            var x = document.F1.X.value;
            var y = document.F1.Y.value;
            document.getElementById("vysledek").innerHTML = "Výsledek: " + (x - y);
        }

        function Plus() {
            var x = document.F1.X.value * 1;
            var y = document.F1.Y.value * 1;
            document.getElementById("vysledek").innerHTML = "Výsledek: " + (x + y);
        }
    </script>
</head>

<body>

<h1>Vítkova kalkulačka 🐶</h1>

<form name="F1">
    x:
    <input type="text" name="X">
    y:
    <input type="text" name="Y">

    <br>

    <input type="button" value="Krát" onclick="Krat()">
    <input type="button" value="Děleno" onclick="Deleno()">
    <input type="button" value="Mínus" onclick="Minus()">
    <input type="button" value="Plus" onclick="Plus()">

    <p id="vysledek">Výsledek:</p>

    <hr>

    <h3>Feedback</h3>
    <input type="text" name="hodnoceni" placeholder="1–10">
    <input type="button" value="Odeslat feedback" onclick="Feedback()">
</form>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB51hDWgvnrsPhFGfK8S8f6uJ4iLyFJDC0",
    authDomain: "kalkulacka-github.firebaseapp.com",
    projectId: "kalkulacka-github"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.Feedback = async function () {
    let hodnoceni = document.F1.hodnoceni.value;

    await addDoc(collection(db, "feedbacks"), {
        text: hodnoceni,
        time: new Date()
    });

    alert("Díky za feedback!");
};
</script>

</body>
</html>
